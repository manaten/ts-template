name: Sync Template

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🔗 Add template remote
        run: |
          if ! git remote | grep -q '^template$'; then
            git remote add template https://github.com/manaten/ts-template.git
          fi

      - name: 📥 Fetch template changes
        run: git fetch template main

      - name: 🔍 Check for updates
        id: check_updates
        run: |
          git fetch template main
          BEHIND=$(git rev-list --count HEAD..template/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Check existing PR
        if: steps.check_updates.outputs.has_updates == 'true'
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --search "Sync template" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "existing_pr=true" >> $GITHUB_OUTPUT
            echo "::notice::既存のPR #$EXISTING_PR があるためスキップします"
          else
            echo "existing_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: 🌿 Create sync branch
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.existing_pr == 'false'
        run: |
          BRANCH_NAME="sync-template-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b "$BRANCH_NAME"

      - name: 🔄 Merge template changes
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.existing_pr == 'false'
        id: merge
        continue-on-error: true
        run: |
          git merge --no-edit template/main

      - name: 📝 Create PR with successful merge
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.existing_pr == 'false' && steps.merge.outcome == 'success'
        id: create_pr
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "🔄 Sync template updates from ts-template" \
            --body "This PR syncs the latest changes from the [ts-template](https://github.com/manaten/ts-template) repository.

          ## Changes
          This PR includes the following commits from the template:

          $(git log --oneline HEAD...template/main | head -10)

          ## Review checklist
          - [ ] Review the changes from the template
          - [ ] Ensure no conflicts with repository-specific code
          - [ ] Test the changes locally if needed

          ---
          🤖 This PR was automatically created by the sync-template workflow." \
            --base main \
            --head "$BRANCH_NAME"

      - name: ⚠️ Handle merge conflicts
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.existing_pr == 'false' && steps.merge.outcome == 'failure'
        id: create_pr_conflict
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git merge --abort || true
          git merge --no-commit --no-ff template/main || true

          # Commit with conflict markers if there are conflicts
          git add .
          git commit -m "Merge template updates (with conflicts)" || true

          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "⚠️ Sync template updates (with conflicts)" \
            --body "This PR attempts to sync the latest changes from the [ts-template](https://github.com/manaten/ts-template) repository.

          ## ⚠️ Conflicts detected
          The merge resulted in conflicts. Please resolve the conflicts manually:

          1. Check out this branch
          2. Resolve conflicts in the affected files
          3. Commit the resolved changes
          4. Push to this branch

          ## Changes
          This PR includes the following commits from the template:

          $(git log --oneline HEAD...template/main | head -10)

          ---
          🤖 This PR was automatically created by the sync-template workflow." \
            --base main \
            --head "$BRANCH_NAME"

      - name: ✅ No updates
        if: steps.check_updates.outputs.has_updates == 'false'
        run: echo "No updates from template repository"

      - name: 🧹 Cleanup on failure
        if: failure() || steps.create_pr.outcome == 'failure' || steps.create_pr_conflict.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$BRANCH_NAME" ]; then
            git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
            echo "::warning::PR作成に失敗したためブランチ $BRANCH_NAME を削除しました"
          fi
